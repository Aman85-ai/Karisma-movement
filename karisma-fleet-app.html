          <input style={{...S.input,marginBottom:14}} placeholder="Cth: Ada calar kecil..." value={form.nota||""} onChange={e=>setForm(f=>({...f,nota:e.target.value}))}/>
          <button onClick={submitForm} style={S.submitBtn(modal.jenis)}>{modal.jenis==="keluar"?"Sahkan Kereta Keluar":"Sahkan Kereta Masuk"}</button>
          <button onClick={()=>setModal(null)} style={S.cancelBtn}>Batal</button>
        </>);})()}
      </div>
    </div>
  )}

  {/* BACKUP */}
  {showBackup&&(
    <div style={S.overlay} onClick={()=>setShowBackup(false)}>
      <div style={S.sheet} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:17,fontWeight:900,marginBottom:4}}>💾 Urus Data</div>
        <div style={{fontSize:13,color:"#64748b",marginBottom:20}}>Backup data supaya selamat.</div>
        <button onClick={doExport} style={{width:"100%",padding:"14px",borderRadius:14,border:"none",cursor:"pointer",fontWeight:900,fontSize:15,color:"#fff",background:"#1d4ed8",marginBottom:10}}>Export Backup</button>
        <label style={{width:"100%",padding:"14px",borderRadius:14,border:"2px dashed #cbd5e1",cursor:"pointer",fontWeight:800,fontSize:14,color:"#475569",display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:16}}>
          Import / Pulihkan<input type="file" accept=".json" style={{display:"none"}} onChange={doImport}/>
        </label>
        <button onClick={()=>setShowBackup(false)} style={S.cancelBtn}>Tutup</button>
      </div>
    </div>
  )}

  {/* CONFIRM CLEAR */}
  {confirmClear&&(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:20,padding:24,width:"100%",maxWidth:340,textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
        <div style={{fontSize:16,fontWeight:900,marginBottom:8}}>Padam Semua Log?</div>
        <div style={{fontSize:13,color:"#64748b",marginBottom:20}}>{rekod.length} rekod akan dipadam.</div>
        <button onClick={doClear} style={{width:"100%",padding:"13px",borderRadius:14,border:"none",cursor:"pointer",fontWeight:900,fontSize:15,color:"#fff",background:"#ef4444",marginBottom:8}}>Ya, Padam</button>
        <button onClick={()=>setConfirmClear(false)} style={S.cancelBtn}>Batal</button>
      </div>
    </div>
  )}

</div>
